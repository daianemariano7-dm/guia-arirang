<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arirang Tour Merch Hub</title>
    
    <!-- Bibliotecas Essenciais -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons para React -->
    <script src="https://unpkg.com/lucide-react"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #7c3aed;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Configuração do seu Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD9uq1lFt5ZEj6YOH9U53kbdU2p6PUXk8s",
            authDomain: "arirangtour-7ed1d.firebaseapp.com",
            projectId: "arirangtour-7ed1d",
            storageBucket: "arirangtour-7ed1d.firebasestorage.app",
            messagingSenderId: "3959226551",
            appId: "1:3959226551:web:8e05ff932ae9dc550dcd32",
            measurementId: "G-QH1RZ1JSZZ"
        };

        // Inicializar Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Mapeamento de Ícones do Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            const LucideIcon = window.lucideReact[name];
            return LucideIcon ? React.createElement(LucideIcon, { size, className }) : null;
        };

        const FILTER_GROUPS = [
            {
                name: 'Vestuário',
                items: [
                    { id: 'tshirts', label: 'Camisetas', icon: '👕' },
                    { id: 'hoodies', label: 'Moletons/Jaquetas', icon: '🧥' },
                    { id: 'caps', label: 'Bonés/Gorros', icon: '🧢' },
                    { id: 'scarves', label: 'Lenços', icon: '🧣' },
                ]
            },
            {
                name: 'Acessórios & Jóias',
                items: [
                    { id: 'jewelry', label: 'Bijus & Semi-jóias', icon: '✨' },
                    { id: 'custom', label: 'Itens Personalizados', icon: '🎨' },
                    { id: 'acc_general', label: 'Acessórios Gerais', icon: '💍' },
                ]
            },
            {
                name: 'Show & Colecionáveis',
                items: [
                    { id: 'fans', label: 'Leques (Fans)', icon: '🪭' },
                    { id: 'official', label: 'Produtos Oficiais', icon: '💜' },
                    { id: 'stationery', label: 'Papelaria/Cards', icon: '📝' },
                    { id: 'deco', label: 'Decoração', icon: '🏠' },
                ]
            }
        ];

        const ALL_CATEGORIES = FILTER_GROUPS.flatMap(g => g.items);

        function App() {
            const [shops, setShops] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedFilters, setSelectedFilters] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [newShop, setNewShop] = useState({
                name: '', instagram: '', link: '', imageUrl: '', categories: []
            });

            useEffect(() => {
                auth.signInAnonymously().catch(err => console.error("Erro Auth:", err));
                
                const unsubscribe = db.collection('shops').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setShops(data);
                    setIsLoading(false);
                }, err => {
                    console.error("Erro Firestore:", err);
                    setIsLoading(false);
                });

                return () => unsubscribe();
            }, []);

            const filteredShops = useMemo(() => {
                return shops.filter(shop => {
                    const nameMatch = shop.name?.toLowerCase().includes(searchTerm.toLowerCase());
                    const instaMatch = shop.instagram?.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesSearch = nameMatch || instaMatch;
                    const matchesCategories = selectedFilters.every(f => shop.categories?.includes(f));
                    return matchesSearch && matchesCategories;
                });
            }, [shops, searchTerm, selectedFilters]);

            const handleSave = async (e) => {
                e.preventDefault();
                try {
                    await db.collection('shops').add({
                        ...newShop,
                        createdAt: new Date().toISOString()
                    });
                    setNewShop({ name: '', instagram: '', link: '', imageUrl: '', categories: [] });
                    setIsAdding(false);
                } catch (e) {
                    alert("Erro ao salvar. Verifique se o Firestore está em 'Modo de Teste'.");
                }
            };

            const handleDelete = async (id) => {
                if(window.confirm("Deseja remover esta loja da curadoria?")) {
                    await db.collection('shops').doc(id).delete();
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    <div className="bg-amber-50 border-b border-amber-100 p-3 text-center">
                        <p className="text-[10px] text-amber-800 font-bold uppercase flex items-center justify-center gap-2">
                            <Icon name="AlertTriangle" size={14} /> 
                            Curadoria de apoio. Não nos responsabilizamos por transações financeiras.
                        </p>
                    </div>

                    <header className="bg-gradient-to-r from-purple-800 via-purple-700 to-indigo-800 text-white pt-10 pb-16 px-6 text-center relative">
                        <div className="max-w-6xl mx-auto relative z-10">
                            <h1 className="text-4xl md:text-5xl font-black mb-4 tracking-tight uppercase italic">
                                Arirang Tour <span className="text-purple-300">Merch Hub</span>
                            </h1>
                            <p className="text-lg text-purple-100 max-w-2xl mx-auto mb-8 font-medium leading-relaxed">
                                Curadoria de lojas fanmades para a tour do BTS, feita com carinho para a ARMY!
                            </p>
                            <div className="flex flex-wrap justify-center gap-4 text-xs font-bold uppercase tracking-widest">
                                <span className="bg-white/10 backdrop-blur-md px-4 py-2 rounded-full border border-white/20">@daianemariano</span>
                                <span className="bg-white/10 backdrop-blur-md px-4 py-2 rounded-full border border-white/20">@oppavemca</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 -mt-10">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <aside className="lg:col-span-3">
                                <div className="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 sticky top-6">
                                    <h2 className="text-lg font-black flex items-center gap-2 mb-6 uppercase tracking-tighter">
                                        <Icon name="Filter" size={18} className="text-purple-600" /> Filtros
                                    </h2>
                                    <div className="space-y-6">
                                        {FILTER_GROUPS.map(group => (
                                            <div key={group.name}>
                                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">{group.name}</h3>
                                                <div className="space-y-1">
                                                    {group.items.map(cat => (
                                                        <button
                                                            key={cat.id}
                                                            onClick={() => setSelectedFilters(prev => prev.includes(cat.id) ? prev.filter(f => f !== cat.id) : [...prev, cat.id])}
                                                            className={`w-full flex items-center justify-between p-2.5 rounded-xl text-sm font-semibold transition-all ${
                                                                selectedFilters.includes(cat.id) ? 'bg-purple-600 text-white shadow-lg' : 'hover:bg-slate-50 text-slate-600'
                                                            }`}
                                                        >
                                                            <div className="flex items-center gap-3"><span>{cat.icon}</span><span>{cat.label}</span></div>
                                                            {selectedFilters.includes(cat.id) && <Icon name="Check" size={14} />}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => setIsAdding(true)} className="w-full mt-8 bg-slate-900 text-white p-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">+ Cadastrar Loja</button>
                                </div>
                            </aside>

                            <div className="lg:col-span-9 space-y-6">
                                <div className="relative">
                                    <div className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400">
                                        <Icon name="Search" size={22} />
                                    </div>
                                    <input 
                                        type="text" placeholder="Busque pelo nome ou @instagra..."
                                        className="w-full pl-16 pr-6 py-5 rounded-3xl border-none shadow-xl focus:ring-4 focus:ring-purple-500/10 outline-none text-lg transition-all"
                                        onChange={e => setSearchTerm(e.target.value)}
                                    />
                                </div>

                                {isLoading ? (
                                    <div className="flex flex-col items-center justify-center py-20 bg-white rounded-3xl border border-slate-100 shadow-xl">
                                        <div className="spinner mb-4"></div>
                                        <p className="text-slate-500 font-bold uppercase text-xs tracking-widest">Carregando curadoria...</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                        {filteredShops.map(shop => (
                                            <div key={shop.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-2xl hover:-translate-y-1 transition-all flex flex-col group">
                                                <div className="h-44 bg-slate-100 relative overflow-hidden">
                                                    <img src={shop.imageUrl || 'https://images.unsplash.com/photo-1594913785162-e6785b493bd2?w=500'} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                                    <div className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => handleDelete(shop.id)} className="bg-white/90 p-2 rounded-full text-red-500 hover:bg-red-500 hover:text-white shadow-sm transition-all">
                                                            <Icon name="Trash2" size={16} />
                                                        </button>
                                                    </div>
                                                </div>
                                                <div className="p-6 flex flex-col flex-grow">
                                                    <h3 className="text-xl font-black text-slate-800 mb-1 leading-tight">{shop.name}</h3>
                                                    <div className="text-purple-600 font-bold text-sm flex items-center gap-1.5 mb-4">
                                                        <Icon name="Instagram" size={16} /> @{shop.instagram?.replace('@', '')}
                                                    </div>
                                                    <div className="flex flex-wrap gap-1.5 mb-6">
                                                        {shop.categories?.map(c => {
                                                            const cat = ALL_CATEGORIES.find(x => x.id === c);
                                                            return <span key={c} className="px-2 py-1 bg-slate-100 rounded-md text-[9px] font-black uppercase text-slate-500 border border-slate-200/50">{cat?.icon} {cat?.label}</span>
                                                        })}
                                                    </div>
                                                    <div className="mt-auto">
                                                        <a href={shop.link} target="_blank" className="block w-full text-center bg-purple-700 text-white py-3.5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg hover:bg-purple-800 transition-all">Ir para a Loja</a>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        {filteredShops.length === 0 && (
                                            <div className="col-span-full py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200">
                                                <div className="flex justify-center mb-4 text-slate-200">
                                                    <Icon name="Search" size={48} />
                                                </div>
                                                <p className="text-slate-500 font-bold uppercase tracking-widest text-xs">Nenhuma loja encontrada</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {isAdding && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] w-full max-w-xl p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-black text-purple-900 uppercase italic">Cadastrar Loja</h2>
                                    <button onClick={() => setIsAdding(false)} className="text-slate-400">
                                        <Icon name="X" size={24} />
                                    </button>
                                </div>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <input required placeholder="Nome da Loja" className="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-purple-500" onChange={e => setNewShop({...newShop, name: e.target.value})} />
                                    <input required placeholder="Instagram (sem @)" className="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-purple-500" onChange={e => setNewShop({...newShop, instagram: e.target.value})} />
                                    <input required placeholder="Link de Venda (Shopee/Site)" className="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-purple-500" onChange={e => setNewShop({...newShop, link: e.target.value})} />
                                    <input placeholder="URL da Foto do Produto (Link JPG/PNG)" className="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-purple-500" onChange={e => setNewShop({...newShop, imageUrl: e.target.value})} />
                                    
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">O que a loja vende?</p>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                            {ALL_CATEGORIES.map(c => (
                                                <button 
                                                    type="button" key={c.id} 
                                                    onClick={() => setNewShop({...newShop, categories: newShop.categories.includes(c.id) ? newShop.categories.filter(x => x !== c.id) : [...newShop.categories, c.id]})} 
                                                    className={`px-3 py-2 rounded-xl text-[10px] font-black uppercase border transition-all ${newShop.categories.includes(c.id) ? 'bg-purple-600 border-purple-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-500'}`}
                                                >
                                                    {c.icon} {c.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <button type="submit" className="w-full py-5 bg-purple-700 text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl hover:shadow-purple-200 transition-all">Cadastrar na Curadoria</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
