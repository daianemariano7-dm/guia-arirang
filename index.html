<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arirang Tour Merch Fanmade</title>
    
    <!-- Bibliotecas Essenciais -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; margin: 0; padding: 0; }
        
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #f82341;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .hero-gradient {
            background: linear-gradient(135deg, #f82341 0%, #d91b36 50%, #9b111e 100%);
        }

        /* Faixa Animada - Fundo Branco e Texto Vermelho */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            background-color: #ffffff;
            color: #f82341;
            width: 100%;
            border-bottom: 2px solid #f82341;
            height: 48px;
            display: flex;
            align-items: center;
        }
        .marquee-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 50s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ID exato do seu projeto conforme o print para garantir a sincronização
        const appId = 'arirang-tour-merch-fanmade'; 
        
        const firebaseConfig = {
            apiKey: "AIzaSyD9uq1lFt5ZEj6YOH9U53kbdU2p6PUXk8s",
            authDomain: "arirangtour-7ed1d.firebaseapp.com",
            projectId: "arirangtour-7ed1d",
            storageBucket: "arirangtour-7ed1d.firebasestorage.app",
            messagingSenderId: "3959226551",
            appId: "1:3959226551:web:8e05ff932ae9dc550dcd32"
        };

        // Inicialização do Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const ADMIN_PASSWORD = "army2025";

        const SimpleIcon = ({ type, size = 20 }) => {
            const icons = {
                search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
                insta: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>,
                trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
                edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
                x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
                check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
                lock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
                unlock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>,
                chevronLeft: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
                chevronRight: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            };
            return icons[type] || null;
        };

        const FILTER_GROUPS = [
            {
                name: 'Vestuário',
                items: [
                    { id: 'caps', label: 'Bonés/Gorros', icon: '🧢' },
                    { id: 'tshirts', label: 'Camisetas', icon: '👕' },
                    { id: 'scarves', label: 'Lenços', icon: '🧣' },
                    { id: 'hoodies', label: 'Moletons/Jaquetas', icon: '🧥' }
                ]
            },
            {
                name: 'Acessórios & Jóias',
                items: [
                    { id: 'acc_general', label: 'Acessórios Gerais & Chaveiros', icon: '💍' },
                    { id: 'jewelry', label: 'Bijutaria & Semi-jóias', icon: '✨' },
                    { id: 'bags_ecobags', label: 'Bolsas/Ecobags', icon: '🎒' },
                    { id: 'custom', label: 'Itens Personalizados', icon: '🎨' }
                ]
            },
            {
                name: 'Show & Colecionáveis',
                items: [
                    { id: 'mug', label: 'Canecas', icon: '☕' },
                    { id: 'deco', label: 'Decoração', icon: '🏠' },
                    { id: 'fans', label: 'Leques (Fans)', icon: '🪭' },
                    { id: 'stationery', label: 'Papelaria', icon: '📝' },
                    { id: 'official', label: 'Produtos Oficiais', icon: '💜' }
                ]
            }
        ];

        const ALL_CATEGORIES = FILTER_GROUPS.flatMap(g => g.items);

        function App() {
            const [shops, setShops] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedFilters, setSelectedFilters] = useState([]);
            const [modalState, setModalState] = useState({ open: false, editingId: null });
            const [isLoading, setIsLoading] = useState(true);
            const [dbError, setDbError] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [currentPage, setCurrentPage] = useState(1);
            const [user, setUser] = useState(null);
            const [formData, setFormData] = useState({ name: '', instagram: '', link: '', imageUrl: '', categories: [] });
            const [message, setMessage] = useState(null);

            const shopsPerPage = 9;

            // Autenticação (Login anônimo ativado por você no painel)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const credential = await auth.signInAnonymously();
                        setUser(credential.user);
                    } catch (e) { 
                        console.error("Erro na Autenticação", e);
                        setDbError("Aguardando ativação do login anônimo no Firebase...");
                        setIsLoading(false);
                    }
                };
                initAuth();
            }, []);

            // Busca de Dados (Sincronização em tempo real na estrutura de pastas correta)
            useEffect(() => {
                if (!user) return;
                
                setIsLoading(true);
                const shopsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('shops');
                
                const unsubscribe = shopsRef.onSnapshot(snap => {
                    if (snap.empty) {
                        setShops([]);
                    } else {
                        const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => new Date(b.createdAt || 0).getTime() - new Date(a.createdAt || 0).getTime());
                        setShops(data);
                    }
                    setIsLoading(false);
                    setDbError(null);
                }, err => {
                    console.error("Firestore Error", err);
                    setDbError("Erro de acesso. Verifique as 'Regras' do seu Firestore.");
                    setIsLoading(false);
                });
                
                return () => unsubscribe();
            }, [user]);

            // Sistema de Filtros: Mostra tudo se nada estiver selecionado
            const filteredShops = useMemo(() => {
                return shops.filter(s => {
                    const term = searchTerm.toLowerCase();
                    const nameMatch = (s.name || '').toLowerCase().includes(term);
                    const instaMatch = (s.instagram || '').toLowerCase().includes(term);
                    const shopCats = s.categories || [];
                    
                    const matchesCategories = selectedFilters.length === 0 || 
                        selectedFilters.every(f => shopCats.includes(f));
                        
                    return (nameMatch || instaMatch) && matchesCategories;
                });
            }, [shops, searchTerm, selectedFilters]);

            // Lógica de Paginação: Aparece apenas a partir de 10 lojas
            const indexOfLastShop = currentPage * shopsPerPage;
            const indexOfFirstShop = indexOfLastShop - shopsPerPage;
            const currentShops = filteredShops.slice(indexOfFirstShop, indexOfLastShop);
            const totalPages = Math.ceil(filteredShops.length / shopsPerPage);

            const showMsg = (txt) => {
                setMessage(txt);
                setTimeout(() => setMessage(null), 4000);
            };

            const handleAdminLogin = () => {
                const pass = prompt("Digite a senha de Gestão:");
                if (pass === ADMIN_PASSWORD) {
                    setIsAdmin(true);
                    showMsg("Acesso Administrativo Liberado!");
                } else {
                    alert("Senha Incorreta");
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!isAdmin) return;
                
                try {
                    const shopsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('shops');
                    const data = { 
                        ...formData, 
                        updatedAt: new Date().toISOString() 
                    };

                    if (modalState.editingId) {
                        await shopsRef.doc(modalState.editingId).update(data);
                        showMsg("Loja atualizada com sucesso!");
                    } else {
                        await shopsRef.add({ 
                            ...data, 
                            createdAt: new Date().toISOString() 
                        });
                        showMsg("Loja registrada na curadoria!");
                    }
                    
                    setModalState({ open: false, editingId: null });
                    setFormData({ name: '', instagram: '', link: '', imageUrl: '', categories: [] });
                    setCurrentPage(1);
                } catch (err) {
                    alert("Erro ao salvar: " + err.message);
                }
            };

            const openEdit = (shop) => {
                setFormData({ 
                    name: shop.name || '', 
                    instagram: shop.instagram || '', 
                    link: shop.link || '', 
                    imageUrl: shop.imageUrl || '', 
                    categories: shop.categories || [] 
                });
                setModalState({ open: true, editingId: shop.id });
            };

            const paginate = (n) => {
                setCurrentPage(n);
                window.scrollTo({ top: 350, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    {/* Alertas Flutuantes */}
                    {message && (
                        <div className="fixed top-24 right-6 z-[100] bg-slate-900 text-white px-8 py-5 rounded-[2rem] shadow-2xl font-black text-xs uppercase tracking-widest border-l-8 border-red-500 animate-in fade-in slide-in-from-right duration-300">
                            {message}
                        </div>
                    )}

                    {/* Faixa Marquee */}
                    <div className="marquee-container">
                        <p className="marquee-text font-black uppercase text-[11px] tracking-[0.1em]">
                           ❗ AVISO: Esta é uma curadoria de apoio para encontrar perfis que já possuem clientes e material para a tour. Não me responsabilizo por transações financeiras ou entregas; a negociação é diretamente com as lojas.
                        </p>
                    </div>

                    {/* Cabeçalho Hero: Título Negrito e Quebra no Subtítulo */}
                    <header className="hero-gradient text-white pt-16 pb-28 px-6 text-center">
                        <div className="max-w-4xl mx-auto">
                            <h1 className="text-3xl md:text-5xl font-black mb-4 uppercase tracking-tighter">
                                Arirang Tour Merch Fanmade
                            </h1>
                            <h2 className="text-lg md:text-xl font-bold text-red-100 mb-8 uppercase tracking-widest leading-tight">
                                Curadoria de lojas fanmades para a tour do BTS, <br />
                                feita para ARMY!
                            </h2>
                            <p className="text-sm md:text-base text-red-50 leading-relaxed mb-12 max-w-2xl mx-auto opacity-95 font-medium text-white">
                                Criado pensando nos fãs que buscam um local centralizado para encontrar lojas que estão produzindo produtos incríveis para esse momento único que iremos viver.
                            </p>
                            
                            <div className="flex flex-col sm:flex-row justify-center items-center gap-4 text-white">
                                <a href="https://instagram.com/daianemariano" target="_blank" className="flex items-center gap-3 bg-white/15 hover:bg-white/25 backdrop-blur-md px-6 py-4 rounded-full border border-white/20 transition-all text-white no-underline group min-w-[210px] justify-center">
                                    <SimpleIcon type="insta" size={20} />
                                    <span className="font-bold tracking-widest text-xs uppercase">@daianemariano</span>
                                </a>
                                <a href="https://instagram.com/oppavemca" target="_blank" className="flex items-center gap-3 bg-white/15 hover:bg-white/25 backdrop-blur-md px-6 py-4 rounded-full border border-white/20 transition-all text-white no-underline group min-w-[210px] justify-center">
                                    <SimpleIcon type="insta" size={20} />
                                    <span className="font-bold tracking-widest text-xs uppercase">@oppavemca</span>
                                </a>
                            </div>
                        </div>
                    </header>

                    {/* Conteúdo Principal */}
                    <main className="max-w-7xl mx-auto px-4 -mt-12 flex-grow w-full pb-20">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            {/* Filtros Lateral */}
                            <aside className="lg:col-span-3">
                                <div className="bg-white p-7 rounded-[3rem] shadow-xl border border-slate-100 sticky top-6">
                                    <h3 className="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest flex items-center gap-2">
                                        <div className="w-1.5 h-4 bg-red-500 rounded-full"></div> Filtrar Categoria
                                    </h3>
                                    <div className="space-y-8">
                                        {FILTER_GROUPS.map(g => (
                                            <div key={g.name} className="flex flex-col gap-2">
                                                <p className="text-[10px] font-black text-[#f82341] uppercase mb-1 tracking-widest">{g.name}</p>
                                                <div className="flex flex-col gap-1.5">
                                                    {g.items.map(c => (
                                                        <button 
                                                            key={c.id} 
                                                            onClick={() => {
                                                                setSelectedFilters(prev => prev.includes(c.id) ? prev.filter(x => x !== c.id) : [...prev, c.id]);
                                                                setCurrentPage(1);
                                                            }}
                                                            className={`flex items-center justify-between p-3.5 rounded-2xl text-xs font-bold transition-all border ${
                                                                selectedFilters.includes(c.id) 
                                                                ? 'bg-[#f82341] text-white border-[#f82341] shadow-lg shadow-red-200' 
                                                                : 'bg-slate-50 text-slate-600 hover:bg-slate-100 border-transparent cursor-pointer'
                                                            }`}
                                                        >
                                                            <div className="flex items-center gap-3">
                                                                <span className="text-base">{c.icon}</span>
                                                                <span>{c.label}</span>
                                                            </div>
                                                            {selectedFilters.includes(c.id) && <SimpleIcon type="check" size={12} />}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {isAdmin && (
                                        <button onClick={() => setModalState({ open: true, editingId: null })} className="w-full mt-10 bg-slate-900 text-white p-5 rounded-[1.5rem] font-black text-[11px] uppercase tracking-[0.2em] hover:bg-slate-800 transition-all shadow-xl active:scale-95 border-none cursor-pointer">
                                            + Cadastrar Loja
                                        </button>
                                    )}
                                </div>
                            </aside>

                            {/* Grid de Lojas */}
                            <div className="lg:col-span-9 space-y-8">
                                <div className="relative group">
                                    <div className="absolute left-8 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-[#f82341] transition-colors">
                                        <SimpleIcon type="search" />
                                    </div>
                                    <input 
                                        type="text" 
                                        placeholder="Procure por nome da loja ou @instagram..." 
                                        className="w-full pl-16 pr-8 py-6 rounded-[2.5rem] border-none shadow-xl focus:ring-4 focus:ring-red-500/10 outline-none text-lg transition-all font-medium text-slate-700" 
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)} 
                                    />
                                </div>

                                {isLoading ? (
                                    <div className="flex flex-col items-center py-40 bg-white rounded-[3rem] shadow-sm">
                                        <div className="spinner mb-6"></div>
                                        <p className="text-slate-400 font-bold uppercase text-[10px] tracking-widest text-center px-4">Sincronizando com a base de dados ARMY...</p>
                                    </div>
                                ) : dbError ? (
                                    <div className="p-16 text-center bg-white rounded-[3rem] border border-red-100 shadow-sm text-slate-900">
                                        <p className="text-red-600 font-black mb-2 uppercase tracking-widest text-sm">Problema Técnico</p>
                                        <p className="text-slate-500 text-sm font-medium mb-6 px-4">{dbError}</p>
                                        <button onClick={() => window.location.reload()} className="px-8 py-3 bg-red-500 text-white rounded-full font-bold text-xs uppercase tracking-widest hover:bg-red-600 transition-all cursor-pointer border-none shadow-lg text-white">Recarregar Página</button>
                                    </div>
                                ) : (
                                    <>
                                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                            {currentShops.map(s => (
                                                <div key={s.id} className="bg-white rounded-[3rem] shadow-sm border border-slate-200 overflow-hidden hover:shadow-2xl transition-all flex flex-col group relative">
                                                    <div className="h-60 bg-slate-100 relative overflow-hidden">
                                                        <img 
                                                            src={s.imageUrl || 'https://images.unsplash.com/photo-1594913785162-e6785b493bd2?w=500'} 
                                                            className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" 
                                                            onError={(e) => {e.target.src = 'https://images.unsplash.com/photo-1594913785162-e6785b493bd2?w=500'}}
                                                        />
                                                        {isAdmin && (
                                                            <div className="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <button onClick={() => openEdit(s)} className="bg-white/95 p-3 rounded-full text-slate-700 hover:text-[#f82341] shadow-md border-none cursor-pointer active:scale-90"><SimpleIcon type="edit" size={16}/></button>
                                                                <button onClick={async () => {
                                                                    if(window.confirm("Remover esta loja?")) {
                                                                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('shops');
                                                                        await ref.doc(s.id).delete();
                                                                        showMsg("Loja removida");
                                                                    }
                                                                }} className="bg-white/95 p-3 rounded-full text-red-500 hover:bg-red-50 shadow-md border-none cursor-pointer active:scale-90"><SimpleIcon type="trash" size={16}/></button>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="p-8 flex flex-col flex-grow text-slate-900">
                                                        <h3 className="text-xl font-black text-slate-800 mb-1.5 leading-tight">{s.name}</h3>
                                                        <p className="text-[#f82341] font-bold text-xs mb-6 uppercase tracking-[0.15em]">@{s.instagram?.replace('@','')}</p>
                                                        <div className="flex flex-wrap gap-1.5 mb-8">
                                                            {(s.categories || []).map(catId => {
                                                                const c = ALL_CATEGORIES.find(x => x.id === catId);
                                                                return <span key={catId} className="px-3 py-1.5 bg-slate-50 rounded-xl text-[9px] font-black uppercase text-slate-500 border border-slate-200/50 flex items-center gap-1">{c?.icon} {c?.label}</span>
                                                            })}
                                                        </div>
                                                        <div className="mt-auto">
                                                            <a href={s.link} target="_blank" className="block w-full text-center bg-[#f82341] text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-lg hover:bg-red-700 active:scale-95 transition-all text-white no-underline">Visitar Loja</a>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {filteredShops.length === 0 ? (
                                             <div className="col-span-full py-28 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200 shadow-sm text-slate-900 text-white">
                                                <p className="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Nenhuma loja encontrada na curadoria.</p>
                                            </div>
                                        ) : totalPages > 1 && (
                                            /* Paginação Numerada que só aparece se houver mais de 9 itens */
                                            <div className="flex justify-center items-center gap-3 mt-16 pb-12">
                                                <button onClick={() => currentPage > 1 && paginate(currentPage - 1)} disabled={currentPage === 1} className={`p-4 rounded-2xl border transition-all ${currentPage === 1 ? 'opacity-20 cursor-not-allowed bg-slate-100' : 'bg-white hover:bg-red-50 text-[#f82341] border-slate-200 cursor-pointer shadow-sm active:scale-90'}`}><SimpleIcon type="chevronLeft" size={20} /></button>
                                                <div className="flex gap-2">
                                                    {[...Array(totalPages)].map((_, i) => (
                                                        <button key={i + 1} onClick={() => paginate(i + 1)} className={`w-12 h-12 rounded-2xl font-black transition-all border ${currentPage === i + 1 ? 'bg-[#f82341] text-white border-[#f82341] shadow-xl' : 'bg-white text-slate-400 border-slate-200 cursor-pointer hover:bg-slate-50'}`}>{i + 1}</button>
                                                    ))}
                                                </div>
                                                <button onClick={() => currentPage < totalPages && paginate(currentPage + 1)} disabled={currentPage === totalPages} className={`p-4 rounded-2xl border transition-all ${currentPage === totalPages ? 'opacity-20 cursor-not-allowed bg-slate-100' : 'bg-white hover:bg-red-50 text-[#f82341] border-slate-200 cursor-pointer shadow-sm active:scale-90'}`}><SimpleIcon type="chevronRight" size={20} /></button>
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Rodapé - Vermelho Vibrante conforme solicitado */}
                    <footer className="bg-[#f82341] text-white mt-24 py-24 px-6 text-center border-t-8 border-red-200/20">
                        <div className="max-w-4xl mx-auto space-y-10 text-white">
                            <p className="text-lg md:text-xl font-black italic opacity-95 uppercase tracking-tighter">"Even if you're not perfect, you're limited edition."</p>
                            
                            <div className="py-2 text-white">
                                <a href="https://canva.link/8bfcqgya0vdkg3q" target="_blank" className="bg-white/15 hover:bg-white/25 backdrop-blur-md px-10 py-6 rounded-3xl border border-white/20 transition-all font-black text-xs tracking-tight inline-block uppercase text-white no-underline shadow-2xl">
                                    BTS World Tour: Comparativo de Excursões para Sorocaba e região
                                </a>
                            </div>

                            <div className="flex flex-wrap justify-center gap-10 text-[9px] font-black uppercase tracking-[0.3em] pt-12 border-t border-white/10 text-white">
                                <a href="https://instagram.com/daianemariano" target="_blank" className="hover:text-red-200 transition-colors flex items-center gap-2 text-white no-underline">@daianemariano</a>
                                <span className="opacity-20 hidden sm:inline text-white">|</span>
                                <a href="https://instagram.com/oppavemca" target="_blank" className="hover:text-red-200 transition-colors flex items-center gap-2 text-white no-underline">@oppavemca</a>
                                <span className="opacity-20 hidden sm:inline text-white">|</span>
                                <button onClick={handleAdminLogin} className="hover:text-red-200 transition-all flex items-center gap-2 uppercase bg-transparent border-none text-white cursor-pointer font-black text-[9px] tracking-[0.3em]">
                                    <SimpleIcon type={isAdmin ? "unlock" : "lock"} size={14}/> {isAdmin ? "MODO GESTÃO ATIVO" : "GESTÃO INTERNA"}
                                </button>
                            </div>
                        </div>
                    </footer>

                    {/* Modal de Cadastro */}
                    {modalState.open && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[4rem] w-full max-w-xl p-10 shadow-2xl max-h-[92vh] overflow-y-auto text-slate-900 no-scrollbar">
                                <div className="flex justify-between items-center mb-10 text-slate-900">
                                    <h2 className="text-2xl font-black text-[#f82341] uppercase italic leading-none">{modalState.editingId ? 'Editar Registro' : 'Novo Registro'}</h2>
                                    <button onClick={() => setModalState({ open: false, editingId: null })} className="text-slate-300 hover:text-slate-600 transition-colors bg-transparent border-none cursor-pointer p-2 p-2 text-slate-900"><SimpleIcon type="x" size={30} /></button>
                                </div>
                                <form onSubmit={handleSave} className="space-y-8 text-slate-900">
                                    <div className="space-y-5">
                                        <div className="space-y-1.5">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-3">Nome da Loja</p>
                                            <input required value={formData.name} placeholder="Ex: Magic Shop" className="w-full p-5 rounded-[2rem] bg-slate-50 border-none outline-none focus:ring-4 focus:ring-red-500/10 font-bold text-sm text-slate-900" onChange={e => setFormData({...formData, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-1.5">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-3">Instagram (@)</p>
                                            <input required value={formData.instagram} placeholder="loja_arirang" className="w-full p-5 rounded-[2rem] bg-slate-50 border-none outline-none focus:ring-4 focus:ring-red-500/10 font-bold text-sm text-slate-900" onChange={e => setFormData({...formData, instagram: e.target.value})} />
                                        </div>
                                        <div className="space-y-1.5">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-3">Link de Venda</p>
                                            <input required value={formData.link} placeholder="URL completa (https://...)" className="w-full p-5 rounded-[2rem] bg-slate-50 border-none outline-none focus:ring-4 focus:ring-red-500/10 font-bold text-sm text-slate-900" onChange={e => setFormData({...formData, link: e.target.value})} />
                                        </div>
                                        <div className="space-y-1.5">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-3">URL da Foto</p>
                                            <input value={formData.imageUrl} placeholder="Link da foto do produto" className="w-full p-5 rounded-[2rem] bg-slate-50 border-none outline-none focus:ring-4 focus:ring-red-500/10 font-bold text-sm text-slate-900" onChange={e => setFormData({...formData, imageUrl: e.target.value})} />
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-5 pt-8 border-t border-slate-100 text-slate-900">
                                        <p className="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-3">Categorias Disponíveis</p>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                            {ALL_CATEGORIES.map(c => (
                                                <button type="button" key={c.id} onClick={() => setFormData({...formData, categories: formData.categories.includes(c.id) ? formData.categories.filter(x => x !== c.id) : [...formData.categories, c.id]})} 
                                                    className={`px-4 py-4 rounded-2xl text-[10px] font-black uppercase border transition-all ${formData.categories.includes(c.id) ? 'bg-[#f82341] border-[#f82341] text-white shadow-lg' : 'bg-white border-slate-200 text-slate-400 hover:border-red-200 cursor-pointer'}`}>
                                                    <span className="text-base mr-2">{c.icon}</span> {c.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-6 bg-[#f82341] text-white rounded-[2.5rem] font-black text-xs uppercase tracking-[0.2em] shadow-2xl hover:bg-red-800 transition-all mt-8 border-none cursor-pointer active:scale-95 text-white">
                                        {modalState.editingId ? 'Salvar Alterações' : 'Cadastrar na Curadoria'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
