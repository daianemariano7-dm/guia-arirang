<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arirang Tour Merch Fanmade</title>
    
    <!-- Bibliotecas Essenciais -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Versão Compatibilidade) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #7c3aed;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .hero-gradient {
            background: linear-gradient(135deg, #4c1d95 0%, #6d28d9 50%, #4338ca 100%);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD9uq1lFt5ZEj6YOH9U53kbdU2p6PUXk8s",
            authDomain: "arirangtour-7ed1d.firebaseapp.com",
            projectId: "arirangtour-7ed1d",
            storageBucket: "arirangtour-7ed1d.firebasestorage.app",
            messagingSenderId: "3959226551",
            appId: "1:3959226551:web:8e05ff932ae9dc550dcd32",
            measurementId: "G-QH1RZ1JSZZ"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const SimpleIcon = ({ type, size = 20 }) => {
            const icons = {
                search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
                filter: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>,
                insta: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>,
                trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
                edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
                x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
                check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            };
            return icons[type] || null;
        };

        const FILTER_GROUPS = [
            {
                name: 'Vestuário',
                items: [
                    { id: 'tshirts', label: 'Camisetas', icon: '👕' },
                    { id: 'hoodies', label: 'Moletons/Jaquetas', icon: '🧥' },
                    { id: 'caps', label: 'Bonés/Gorros', icon: '🧢' },
                    { id: 'scarves', label: 'Lenços', icon: '🧣' },
                ]
            },
            {
                name: 'Acessórios & Jóias',
                items: [
                    { id: 'jewelry', label: 'Bijus & Semi-jóias', icon: '✨' },
                    { id: 'custom', label: 'Itens Personalizados', icon: '🎨' },
                    { id: 'acc_general', label: 'Acessórios Gerais', icon: '💍' },
                ]
            },
            {
                name: 'Show & Colecionáveis',
                items: [
                    { id: 'fans', label: 'Leques (Fans)', icon: '🪭' },
                    { id: 'official', label: 'Produtos Oficiais', icon: '💜' },
                    { id: 'stationery', label: 'Papelaria/Cards', icon: '📝' },
                    { id: 'deco', label: 'Decoração', icon: '🏠' },
                ]
            }
        ];

        const ALL_CATEGORIES = FILTER_GROUPS.flatMap(g => g.items);

        function App() {
            const [shops, setShops] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedFilters, setSelectedFilters] = useState([]);
            const [modalState, setModalState] = useState({ open: false, editingId: null });
            const [isLoading, setIsLoading] = useState(true);
            const [formData, setFormData] = useState({ name: '', instagram: '', link: '', imageUrl: '', categories: [] });

            useEffect(() => {
                auth.signInAnonymously();
                const unsub = db.collection('shops').orderBy('createdAt', 'desc').onSnapshot(snap => {
                    setShops(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoading(false);
                }, err => {
                    console.error("Erro Firestore:", err);
                    setIsLoading(false);
                });
                return () => unsub();
            }, []);

            const filteredShops = useMemo(() => shops.filter(s => 
                (s.name?.toLowerCase().includes(searchTerm.toLowerCase()) || s.instagram?.toLowerCase().includes(searchTerm.toLowerCase())) &&
                selectedFilters.every(f => s.categories?.includes(f))
            ), [shops, searchTerm, selectedFilters]);

            const handleSave = async (e) => {
                e.preventDefault();
                const data = { ...formData, updatedAt: new Date().toISOString() };
                if (modalState.editingId) {
                    await db.collection('shops').doc(modalState.editingId).update(data);
                } else {
                    await db.collection('shops').add({ ...data, createdAt: new Date().toISOString() });
                }
                setModalState({ open: false, editingId: null });
                setFormData({ name: '', instagram: '', link: '', imageUrl: '', categories: [] });
            };

            const openEdit = (shop) => {
                setFormData({ name: shop.name, instagram: shop.instagram, link: shop.link, imageUrl: shop.imageUrl, categories: shop.categories || [] });
                setModalState({ open: true, editingId: shop.id });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Alerta de Responsabilidade */}
                    <div className="bg-amber-100 border-b border-amber-200 p-4 text-center">
                        <p className="text-[11px] text-amber-900 font-bold uppercase tracking-tight leading-relaxed max-w-4xl mx-auto">
                           ❗ AVISO: Esta é uma curadoria de apoio para encontrar perfis que já possuem clientes e material para a tour. Não me responsabilizo por transações financeiras ou entregas; a negociação é diretamente com as lojas.
                        </p>
                    </div>

                    {/* Cabeçalho / Hero */}
                    <header className="hero-gradient text-white pt-16 pb-24 px-6 text-center">
                        <div className="max-w-4xl mx-auto">
                            <h1 className="text-4xl md:text-6xl font-black mb-3 uppercase italic tracking-tighter">
                                Arirang Tour <span className="text-purple-300">Merch Fanmade</span>
                            </h1>
                            <h2 className="text-xl md:text-2xl font-bold text-purple-200 mb-6 uppercase tracking-widest leading-tight">
                                Curadoria de lojas fanmades para a tour do BTS, feita para a ARMY!
                            </h2>
                            <p className="text-base md:text-lg text-purple-50 leading-relaxed mb-10 max-w-3xl mx-auto opacity-90 font-medium">
                                Criado pensando nos fãs que buscam um local centralizado para encontrar lojas que estão produzindo produtos incríveis para esse momento único que iremos viver.
                            </p>
                            
                            {/* Perfis Apresentados conforme Imagem 1 */}
                            <div className="flex flex-col sm:flex-row justify-center items-center gap-4 mt-8">
                                <a href="https://instagram.com/daianemariano" target="_blank" className="flex items-center gap-3 bg-white/10 hover:bg-white/20 backdrop-blur-md px-6 py-3 rounded-full border border-white/20 transition-all group min-w-[200px] justify-center">
                                    <div className="bg-white/20 p-2 rounded-full group-hover:scale-110 transition-transform">
                                        <SimpleIcon type="insta" size={18} />
                                    </div>
                                    <span className="font-bold tracking-widest text-sm uppercase">@daianemariano</span>
                                </a>
                                <a href="https://instagram.com/oppavemca" target="_blank" className="flex items-center gap-3 bg-white/10 hover:bg-white/20 backdrop-blur-md px-6 py-3 rounded-full border border-white/20 transition-all group min-w-[200px] justify-center">
                                    <div className="bg-white/20 p-2 rounded-full group-hover:scale-110 transition-transform">
                                        <SimpleIcon type="insta" size={18} />
                                    </div>
                                    <span className="font-bold tracking-widest text-sm uppercase">@oppavemca</span>
                                </a>
                            </div>
                        </div>
                    </header>

                    {/* Conteúdo Principal */}
                    <main className="max-w-7xl mx-auto px-4 -mt-12 flex-grow w-full">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            {/* Filtros Sidebar conforme Imagem 2 */}
                            <aside className="lg:col-span-3">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 sticky top-6">
                                    <h3 className="text-xs font-black uppercase text-slate-400 mb-6 flex items-center gap-2 tracking-[0.1em]">
                                        <SimpleIcon type="filter" size={14}/> Filtrar Itens
                                    </h3>
                                    <div className="space-y-8">
                                        {FILTER_GROUPS.map(g => (
                                            <div key={g.name} className="flex flex-col gap-2">
                                                <p className="text-[11px] font-black text-purple-600 uppercase mb-2 tracking-widest flex items-center gap-2">
                                                    <span className="w-1.5 h-1.5 bg-purple-600 rounded-full"></span>
                                                    {g.name}
                                                </p>
                                                <div className="flex flex-col gap-1.5">
                                                    {g.items.map(c => (
                                                        <button 
                                                            key={c.id} 
                                                            onClick={() => setSelectedFilters(p => p.includes(c.id) ? p.filter(x => x !== c.id) : [...p, c.id])}
                                                            className={`flex items-center justify-between p-3 rounded-2xl text-sm font-bold transition-all ${
                                                                selectedFilters.includes(c.id) 
                                                                ? 'bg-purple-600 text-white shadow-lg shadow-purple-100' 
                                                                : 'bg-slate-50 text-slate-600 hover:bg-slate-100'
                                                            }`}
                                                        >
                                                            <div className="flex items-center gap-3">
                                                                <span className="text-lg">{c.icon}</span>
                                                                <span>{c.label}</span>
                                                            </div>
                                                            {selectedFilters.includes(c.id) && <SimpleIcon type="check" size={14} />}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => setModalState({ open: true, editingId: null })} className="w-full mt-10 bg-slate-900 text-white p-5 rounded-[1.5rem] font-black text-xs uppercase tracking-widest hover:bg-slate-800 transition-all shadow-xl active:scale-95">
                                        + Cadastrar Loja
                                    </button>
                                </div>
                            </aside>

                            {/* Área de Busca e Cards */}
                            <div className="lg:col-span-9 space-y-6">
                                <div className="relative group">
                                    <div className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-purple-500 transition-colors">
                                        <SimpleIcon type="search" />
                                    </div>
                                    <input 
                                        type="text" 
                                        placeholder="Procure por nome da loja ou @instagram..." 
                                        className="w-full pl-16 pr-6 py-6 rounded-[2rem] border-none shadow-xl focus:ring-4 focus:ring-purple-500/10 outline-none text-lg transition-all" 
                                        onChange={e => setSearchTerm(e.target.value)} 
                                    />
                                </div>

                                {isLoading ? (
                                    <div className="flex flex-col items-center py-32 bg-white rounded-[3rem] shadow-sm">
                                        <div className="spinner mb-4"></div>
                                        <p className="text-slate-400 font-bold uppercase text-[10px] tracking-widest">Carregando lojas...</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                        {filteredShops.map(s => (
                                            <div key={s.id} className="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden hover:shadow-2xl transition-all flex flex-col group relative">
                                                <div className="h-52 bg-slate-100 relative overflow-hidden">
                                                    <img 
                                                        src={s.imageUrl || 'https://images.unsplash.com/photo-1594913785162-e6785b493bd2?w=500'} 
                                                        alt={s.name}
                                                        className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" 
                                                    />
                                                    <div className="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => openEdit(s)} className="bg-white/95 p-2.5 rounded-full text-slate-700 hover:text-purple-600 shadow-md transition-all active:scale-90">
                                                            <SimpleIcon type="edit" size={16}/>
                                                        </button>
                                                        <button onClick={async () => window.confirm("Remover esta loja da lista?") && await db.collection('shops').doc(s.id).delete()} className="bg-white/95 p-2.5 rounded-full text-red-500 hover:bg-red-50 shadow-md transition-all active:scale-90">
                                                            <SimpleIcon type="trash" size={16}/>
                                                        </button>
                                                    </div>
                                                </div>
                                                <div className="p-7 flex flex-col flex-grow">
                                                    <h3 className="text-xl font-black text-slate-800 mb-1 leading-tight">{s.name}</h3>
                                                    <p className="text-purple-600 font-bold text-sm mb-5">@{s.instagram?.replace('@','')}</p>
                                                    
                                                    <div className="flex flex-wrap gap-1.5 mb-8">
                                                        {s.categories?.map(catId => {
                                                            const c = ALL_CATEGORIES.find(x => x.id === catId);
                                                            return <span key={catId} className="px-2.5 py-1 bg-slate-100 rounded-lg text-[9px] font-black uppercase text-slate-500 border border-slate-200/50">{c?.icon} {c?.label}</span>
                                                        })}
                                                    </div>
                                                    
                                                    <div className="mt-auto">
                                                        <a href={s.link} target="_blank" className="block w-full text-center bg-purple-700 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg hover:bg-purple-800 active:scale-95 transition-all">Visitar Loja</a>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        {filteredShops.length === 0 && (
                                            <div className="col-span-full py-32 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                                                <div className="flex justify-center mb-4 text-slate-200"><SimpleIcon type="search" size={48} /></div>
                                                <p className="text-slate-400 font-bold uppercase tracking-widest text-xs">Nenhuma loja encontrada com esses filtros</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="bg-purple-900 text-white mt-24 py-16 px-6 text-center border-t-4 border-purple-400">
                        <div className="max-w-4xl mx-auto space-y-6">
                            <p className="text-lg md:text-xl font-black italic opacity-90 uppercase tracking-tighter">"Even if you're not perfect, you're limited edition."</p>
                            <div className="flex flex-wrap justify-center gap-8 text-[10px] font-black uppercase tracking-[0.2em] pt-6 border-t border-white/10">
                                <a href="https://instagram.com/daianemariano" target="_blank" className="hover:text-purple-300 transition-colors flex items-center gap-2">
                                    <SimpleIcon type="insta" size={14}/> @daianemariano
                                </a>
                                <span className="opacity-20 hidden sm:inline">|</span>
                                <a href="https://instagram.com/oppavemca" target="_blank" className="hover:text-purple-300 transition-colors flex items-center gap-2">
                                    <SimpleIcon type="insta" size={14}/> @oppavemca
                                </a>
                            </div>
                        </div>
                    </footer>

                    {/* Modal Cadastro/Edição */}
                    {modalState.open && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-xl p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black text-purple-900 uppercase italic leading-none">{modalState.editingId ? 'Editar Loja' : 'Cadastrar Loja'}</h2>
                                    <button onClick={() => setModalState({ open: false, editingId: null })} className="text-slate-400 hover:text-slate-600 transition-colors"><SimpleIcon type="x" /></button>
                                </div>
                                <form onSubmit={handleSave} className="space-y-6">
                                    <div className="space-y-4">
                                        <div className="space-y-1">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nome da Loja</p>
                                            <input required value={formData.name} placeholder="Ex: Magic Shop" className="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-purple-500 font-bold text-sm" onChange={e => setFormData({...formData, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Instagram (@)</p>
                                            <input required value={formData.instagram} placeholder="Ex: loja_exemplo" className="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-purple-500 font-bold text-sm" onChange={e => setFormData({...formData, instagram: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Link de Venda (Shopee/Site)</p>
                                            <input required value={formData.link} placeholder="https://..." className="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-purple-500 font-bold text-sm" onChange={e => setFormData({...formData, link: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Link da Imagem (JPEG/PNG)</p>
                                            <input value={formData.imageUrl} placeholder="URL da foto do produto" className="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-purple-500 font-bold text-sm" onChange={e => setFormData({...formData, imageUrl: e.target.value})} />
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-4 pt-2">
                                        <p className="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-1 border-b pb-2">Selecione as categorias disponíveis:</p>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                            {ALL_CATEGORIES.map(c => (
                                                <button type="button" key={c.id} onClick={() => setFormData({...formData, categories: formData.categories.includes(c.id) ? formData.categories.filter(x => x !== c.id) : [...formData.categories, c.id]})} 
                                                    className={`px-3 py-3 rounded-xl text-[10px] font-black uppercase border transition-all ${formData.categories.includes(c.id) ? 'bg-purple-600 border-purple-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-500 hover:border-purple-200'}`}>
                                                    <span className="text-base mr-1">{c.icon}</span> {c.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <button type="submit" className="w-full py-5 bg-purple-700 text-white rounded-[1.5rem] font-black text-sm uppercase tracking-widest shadow-xl hover:bg-purple-800 transition-all mt-4 active:scale-95">
                                        {modalState.editingId ? 'Salvar Alterações' : 'Publicar na Curadoria'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
